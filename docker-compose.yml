version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sales-insight-api
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  logs:
    driver: local
